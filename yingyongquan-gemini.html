<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>应用圈 - 核心模块</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen text-gray-800 font-sans p-4">
    <div class="max-w-md mx-auto space-y-4">

        <div class="relative bg-gradient-to-br from-blue-400 to-blue-500 rounded-3xl p-5 text-white shadow-md overflow-hidden">
            <div class="flex items-center space-x-2 mb-4">
                <svg class="w-5 h-5 text-white" fill="currentColor" viewBox="0 0 20 20"><path d="M10 2a6 6 0 00-6 6v3.586l-.707.707A1 1 0 004 14h12a1 1 0 00.707-1.707L16 11.586V8a6 6 0 00-6-6zM10 18a3 3 0 01-3-3h6a3 3 0 01-3 3z"></path></svg>
                <span class="font-medium text-lg">我的工作</span>
            </div>

            <div class="flex justify-between items-center mb-6 bg-white/10 rounded-2xl p-3 backdrop-blur-sm">
                <div class="text-center flex-1 border-r border-white/20">
                    <div class="text-sm text-blue-50">待处理</div>
                    <div class="text-2xl font-bold mt-1 text-blue-600 bg-white rounded-lg mx-2 py-1 shadow-sm">18</div>
                </div>
                <div class="text-center flex-1 border-r border-white/20">
                    <div class="text-sm text-blue-50">待阅</div>
                    <div class="text-2xl font-bold mt-1 text-orange-500">5</div>
                </div>
                <div class="text-center flex-1">
                    <div class="text-sm text-blue-50">超时</div>
                    <div class="text-2xl font-bold mt-1 text-red-500">2</div>
                </div>
            </div>

            <div class="flex items-center justify-between mt-2">
                <div class="flex items-center text-sm bg-white/20 px-3 py-1.5 rounded-full">
                    <span class="mr-1">🤖 AI 提醒:</span> 今日有 2 项审批 17:00 前需处理
                </div>
                <button class="bg-blue-600 text-white px-4 py-1.5 rounded-full text-sm font-medium hover:bg-blue-700 transition">
                    立即处理 &gt;
                </button>
            </div>
        </div>

        <div class="bg-white rounded-3xl p-5 shadow-sm border border-gray-100">
            <div class="flex justify-between items-center mb-2">
                <div class="flex items-center font-bold text-lg">
                    <span class="mr-2 text-blue-500">🤖</span> AI 工作助手
                </div>
                <a href="#" class="text-gray-400 text-sm flex items-center">更多 <svg class="w-4 h-4 ml-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg></a>
            </div>
            <p class="text-gray-500 text-sm mb-4">您有 18 条待办，建议优先处理以下事项：</p>

            <div class="space-y-3">
                <div class="flex p-3 bg-gray-50 rounded-2xl items-start">
                    <div class="bg-blue-100 text-blue-600 font-bold w-8 h-8 rounded-full flex items-center justify-center shrink-0 mr-3">1</div>
                    <div class="flex-1">
                        <div class="flex items-center justify-between">
                            <h4 class="font-medium text-gray-900 truncate pr-2">利率定价偏离审批</h4>
                            <span class="text-xs text-red-500 bg-red-50 px-2 py-0.5 rounded border border-red-100 shrink-0">今日 17:00 截止</span>
                        </div>
                        <p class="text-gray-500 text-sm mt-1">涉及 5000 万授信</p>
                    </div>
                </div>

                <div class="flex p-3 bg-gray-50 rounded-2xl items-start">
                    <div class="bg-gray-200 text-gray-600 font-bold w-8 h-8 rounded-full flex items-center justify-center shrink-0 mr-3">2</div>
                    <div class="flex-1">
                        <div class="flex items-center justify-between">
                            <h4 class="font-medium text-gray-900 truncate pr-2">发文审批：关于新一代系统建设的请示</h4>
                            <span class="text-xs text-red-500 bg-red-50 px-2 py-0.5 rounded border border-red-100 shrink-0">已超时 2 天</span>
                        </div>
                        <p class="text-gray-500 text-sm mt-1">请尽快处理</p>
                    </div>
                </div>
            </div>

            <div class="mt-4 pt-3 border-t border-gray-100 text-center">
                <button class="text-blue-500 text-sm font-medium">查看全部建议 &gt;</button>
            </div>
        </div>

    </div>
</body>
</html>
